name: aup-kanban

services:
  aup-kanban:
    image: ip2-kanban-cli:local
    build:
      context: ..
      dockerfile: container/Dockerfile.kanban
    restart: always
    container_name: aup-kanban-1
    network_mode: "bridge"
    environment:
      - EXAMPLE_CONFIG=/test/test
    init: true
    user: "${KANBAN_UID:-1000}:${KANBAN_GID:-1000}"
    working_dir: /workspace
    volumes:
      - ${KANBAN_REPO_PATH:-../ip-2.0}:/workspace
