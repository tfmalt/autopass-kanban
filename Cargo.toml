[workspace]
members = [
  "crates/core",
  "crates/cli",
  "crates/tui",
  "crates/web",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "UNLICENSED"
version = "26.5.298"

[workspace.dependencies]
anyhow = "1.0.100"
chrono = { version = "0.4.42", default-features = true }
clap = { version = "4.5.53", features = ["derive"] }
clap_complete = "4.5.61"
regex = "1.12.2"
serde = { version = "1.0.228", features = ["derive"] }
tempfile = "3.23.0"
walkdir = "2.5.0"
