[workspace]
members = [
  "crates/core",
  "crates/cli",
  "crates/tui",
  "crates/web",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "UNLICENSED"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.53", features = ["derive"] }
regex = "1.12.2"
serde = { version = "1.0.228", features = ["derive"] }
tempfile = "3.23.0"
walkdir = "2.5.0"
