name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package, without leading v"
        required: false

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: kanban
            packages: ""
            linker_env: ""
            linker: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: kanban
            packages: ""
            linker_env: ""
            linker: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: kanban
            packages: ""
            linker_env: ""
            linker: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: kanban
            packages: musl-tools
            linker_env: ""
            linker: ""
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: kanban
            packages: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker: aarch64-linux-gnu-gcc
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: kanban.exe
            packages: ""
            linker_env: ""
            linker: ""
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            binary: kanban.exe
            packages: ""
            linker_env: ""
            linker: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        shell: bash
        run: npm ci --prefix web

      - name: Install Linux target packages
        if: runner.os == 'Linux' && matrix.packages != ''
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}

      - name: Configure linker
        if: matrix.linker_env != ''
        shell: bash
        run: echo "${{ matrix.linker_env }}=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build release binary
        shell: bash
        run: cargo build -p kanban-cli --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ github.event.inputs.version }}" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          cargo_version=$(awk -F '"' '/^version =/{print $2; exit}' Cargo.toml)
          if [ "$version" != "$cargo_version" ]; then
            echo "Tag version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi

          archive="kanban-${version}-${{ matrix.target }}.tar.gz"
          staging="dist/${{ matrix.target }}"
          mkdir -p "$staging/skills"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$staging/${{ matrix.binary }}"
          cp -R skills/kanban-backlog-maintainer "$staging/skills/"
          cp -R skills/kanban-developer "$staging/skills/"
          printf '%s\n' "$version" > "$staging/VERSION"
          tar -C "$staging" -czf "$archive" "${{ matrix.binary }}" skills VERSION
          mkdir -p release-assets
          mv "$archive" release-assets/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: kanban-${{ matrix.target }}
          path: release-assets/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: always() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: kanban-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive_count=$(find release-assets -maxdepth 1 -name 'kanban-*.tar.gz' | wc -l | tr -d ' ')
          if [ "$archive_count" -eq 0 ]; then
            echo "No release archives were built" >&2
            exit 1
          fi
          sh scripts/release/checksums.sh release-assets/kanban-*.tar.gz > "release-assets/kanban-${version}-checksums.txt"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/*-checksums.txt
